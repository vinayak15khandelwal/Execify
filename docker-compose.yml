version: '3.8'

services:
  redis:
    image: redis:alpine
    ports:
      - '6379:6379'
    restart: unless-stopped

  server:
    build: ./server
    ports:
      - '4000:4000'
    environment:
      - PORT=4000
      - REDIS_URL=redis://redis:6379
      - CLIENT_URL=http://localhost:5173
    depends_on:
      - redis
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    restart: unless-stopped

  client:
    build: ./client
    ports:
      - '5173:5173'
    depends_on:
      - server
    restart: unless-stopped